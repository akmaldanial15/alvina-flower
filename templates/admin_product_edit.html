{% extends 'base.html' %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/admin_product_edit.css') }}">

<main class="edit-wrapper">
    
    <header class="edit-header">
        <div class="edit-title-group">
            <a href="{{ url_for('admin_products') }}" class="edit-back-btn" aria-label="Go back">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            </a>
            <h1 class="edit-title">Refine Masterpiece</h1>
        </div>
    </header>

    <form class="edit-card" action="{{ url_for('edit_product', id=product.id) }}" method="POST" enctype="multipart/form-data">
        
        <!-- Left: Image Management -->
        <div class="img-col">
            <div class="img-preview-box">
                <img src="{{ product.image }}" alt="{{ product.name }}" id="preview-image">
            </div>
            
            <div style="width: 100%;">
                <div class="file-upload-wrapper">
                    <input type="file" name="image" id="image-upload" class="file-upload-input" accept="image/*" onchange="previewFile()">
                    <div class="file-upload-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                        <span id="file-name">Update Cover Image</span>
                    </div>
                </div>
                <div class="file-tip">Leave blank to keep the current exquisite image.</div>
            </div>
        </div>

        <!-- Right: Form Data -->
        <div class="form-col">
            
            <div class="form-row">
                <div class="input-grp">
                    <label>Masterpiece Name</label>
                    <input type="text" name="name" class="sleek-input" value="{{ product.name }}" required placeholder="e.g. Pastel Dream Bouquet">
                </div>
                <div class="input-grp">
                    <label>Price Value (RM)</label>
                    <div style="position:relative;">
                        <span style="position:absolute; left:18px; top:50%; transform:translateY(-50%); color:var(--text-muted); font-weight:700;">RM</span>
                        <input type="number" step="0.01" name="price" class="sleek-input" value="{{ product.price }}" required style="padding-left: 3rem;">
                    </div>
                </div>
            </div>

            <div class="input-grp">
                <label>Curator's Description</label>
                <textarea name="description" class="sleek-textarea" required placeholder="Describe the feeling this arrangement evokes...">{{ product.description }}</textarea>
            </div>

            <div class="form-row-3">
                <div class="input-grp">
                    <label>Collection</label>
                    <select name="category" class="sleek-select">
                        <option value="Bouquets" {% if product.category == 'Bouquets' %}selected{% endif %}>Bouquets</option>
                        <option value="Boxed Flowers" {% if product.category == 'Boxed Flowers' %}selected{% endif %}>Boxed Flowers</option>
                        <option value="Baskets" {% if product.category == 'Baskets' %}selected{% endif %}>Baskets</option>
                        <option value="Vases" {% if product.category == 'Vases' %}selected{% endif %}>Vases</option>
                    </select>
                </div>
                <div class="input-grp">
                    <label>Tier</label>
                    <select name="budget" class="sleek-select">
                        <option value="Low" {% if product.budget == 'Low' %}selected{% endif %}>Low Tier</option>
                        <option value="Medium" {% if product.budget == 'Medium' %}selected{% endif %}>Medium Tier</option>
                        <option value="High" {% if product.budget == 'High' %}selected{% endif %}>High Tier</option>
                        <option value="Premium" {% if product.budget == 'Premium' %}selected{% endif %}>Premium Luxury</option>
                    </select>
                </div>
                <div class="input-grp">
                    <label>Primary Intent</label>
                    <input type="text" name="use" class="sleek-input" value="{{ product.use }}" required placeholder="e.g. Anniversary">
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-save">
                    Lock In Perfection
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
                </button>
            </div>

        </div>
    </form>
</main>

<script>
    // Live Image Preview Script
    function previewFile() {
        const preview = document.getElementById('preview-image');
        const fileInput = document.getElementById('image-upload');
        const fileBox = document.getElementById('file-name');
        const file = fileInput.files[0];
        const reader = new FileReader();

        reader.addEventListener("load", function () {
            preview.src = reader.result;
        }, false);

        if (file) {
            reader.readAsDataURL(file);
            let name = file.name;
            if(name.length > 20) name = name.substring(0,20) + '...';
            fileBox.textContent = name;
        }
    }
</script>
{% endblock %}
